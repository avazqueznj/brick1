; https://docs.platformio.org/page/projectconf.html

[env:giga_r1_m7]
platform = ststm32
board = giga_r1_m7
framework = arduino
monitor_speed = 115200

[env:giga_dfu]
platform = ststm32
board = giga_r1_m7
framework = arduino
upload_protocol = dfu
monitor_speed = 115200