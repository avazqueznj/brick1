; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html




; -------- common flags applied to all envs --------
[env]
; remove the core’s “no exceptions” default
build_unflags = -fno-exceptions --specs=nano.specs
build_flags = -fexceptions -DPIO_FRAMEWORK_ARDUINO_ENABLE_EXCEPTIONS -DLV_LAYOUT_NONE=0

; -------- your normal serial upload env --------
[env:giga_r1_USB]
platform = ststm32
board = giga_r1_m7
framework = arduino
monitor_speed = 115200
board_build.arduino.flash_layout = 100_0
board_upload.maximum_size = 2097152

; -------- DFU upload env --------
[env:giga_DFU]
platform = ststm32
board = giga_r1_m7
framework = arduino
upload_protocol = dfu
monitor_speed = 115200
board_build.arduino.flash_layout = 100_0
board_upload.maximum_size = 2097152

; -------- ST-Link upload/debug env --------
[env:giga_DEBUG]
platform = ststm32
board = giga_r1_m7
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
build_unflags = -fno-exceptions --specs=nano.specs
board_build.arduino.flash_layout = 100_0
board_upload.maximum_size = 2097152

